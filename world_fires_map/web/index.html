<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>World Fires Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        // Karte initialisieren (Zentriert auf Europa)
        const map = L.map('map').setView([50.0, 10.0], 4);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Distanz-Berechnung
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // Konfiguration und Daten laden
        async function load() {
            const [confRes, dataRes] = await Promise.all([fetch('/api/config'), fetch('/api/data')]);
            const config = await confRes.json();
            const json = await dataRes.json();

            if (json.data && Array.isArray(json.data)) {
                json.data.forEach(fire => {
                    const lat = parseFloat(fire.latitude);
                    const lon = parseFloat(fire.longitude);
                    // Filter: Nur anzeigen, wenn innerhalb des Radius der HA-Konfiguration
                    if (getDist(config.lat, config.lon, lat, lon) <= config.radius) {
                        L.marker([lat, lon]).addTo(map)
                         .bindPopup(`Feuer erkannt um: ${fire.acq_time} UTC`);
                    }
                });
            }
        }
        load();
    </script>
</body>
</html>
